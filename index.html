<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#2c3e50">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="家倉">
  <meta name="description" content="家庭物品管理倉庫，全家人一起管理家中物品">
  <title>家倉 - 家庭物品管理</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="icon" type="image/png" href="icons/icon-192.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang TC', 'Microsoft JhengHei', sans-serif; background: #f8f9fa; color: #1c1c1e; overscroll-behavior-y: none; }

    /* 登入畫面 */
    .login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #2c3e50 0%, #4a6741 100%); z-index: 500; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 24px; }
    .login-screen.hidden { display: none; }
    .login-icon { font-size: 80px; margin-bottom: 20px; }
    .login-title { color: white; font-size: 28px; font-weight: 700; margin-bottom: 8px; }
    .login-sub { color: rgba(255,255,255,0.7); font-size: 15px; margin-bottom: 40px; text-align: center; }
    .login-form { width: 100%; max-width: 320px; }
    .login-input { width: 100%; padding: 16px 20px; border: none; border-radius: 14px; font-size: 16px; margin-bottom: 12px; background: rgba(255,255,255,0.15); color: white; }
    .login-input::placeholder { color: rgba(255,255,255,0.5); }
    .login-input:focus { outline: none; background: rgba(255,255,255,0.25); }
    .login-btn { width: 100%; padding: 16px; border: none; border-radius: 14px; background: white; color: #2c3e50; font-size: 16px; font-weight: 700; cursor: pointer; margin-bottom: 12px; }
    .login-btn:active { opacity: 0.9; }
    .login-hint { color: rgba(255,255,255,0.5); font-size: 13px; text-align: center; margin-top: 16px; }
    .login-error { color: #ff6b6b; font-size: 14px; text-align: center; margin-bottom: 12px; display: none; }
    .login-error.show { display: block; }
    .sync-status { position: fixed; top: 8px; right: 12px; z-index: 50; font-size: 12px; padding: 4px 10px; border-radius: 10px; background: rgba(0,0,0,0.3); color: white; display: none; }
    .sync-status.show { display: block; }
    .sync-status.syncing { background: #f1c40f; color: #333; }
    .sync-status.online { background: #27ae60; }
    .sync-status.offline { background: #e74c3c; }

    /* 頂部 */
    .header { background: linear-gradient(135deg, #2c3e50 0%, #4a6741 100%); color: white; padding: 24px 20px 20px; border-radius: 0 0 24px 24px; box-shadow: 0 4px 20px rgba(44,62,80,0.3); position: sticky; top: 0; z-index: 10; }
    .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .header h1 { font-size: 22px; font-weight: 700; }
    .item-count { background: rgba(255,255,255,0.2); padding: 4px 12px; border-radius: 12px; font-size: 13px; }
    .cat-scroll { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }
    .cat-scroll::-webkit-scrollbar { display: none; }
    .cat-btn { white-space: nowrap; padding: 6px 14px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.3); background: transparent; color: white; font-size: 13px; cursor: pointer; transition: all 0.2s; }
    .cat-btn.active { background: rgba(255,255,255,0.35); border-color: rgba(255,255,255,0.5); }
    .cat-btn .cat-delete { margin-left: 6px; font-size: 11px; opacity: 0.7; }

    /* 搜索 */
    .search-box { padding: 12px 16px; }
    .search-inner { background: white; border-radius: 14px; padding: 10px 16px; display: flex; align-items: center; gap: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    .search-inner input { border: none; outline: none; flex: 1; font-size: 15px; background: transparent; }

    /* 過期提醒 */
    .expiry-alert { margin: 0 16px 12px; }
    .expiry-alert-inner { background: linear-gradient(135deg, #fff3cd 0%, #ffeaa7 100%); border-radius: 14px; padding: 12px 16px; display: flex; align-items: center; gap: 10px; border: 1px solid #f0d78c; }
    .expiry-alert-text { font-size: 14px; font-weight: 600; color: #856404; }
    .expiry-alert-sub { font-size: 12px; color: #856404; }

    /* 物品列表 */
    .items-list { padding: 0 16px; padding-bottom: 140px; }
    .item-card { background: white; border-radius: 16px; padding: 14px; margin-bottom: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.04); display: flex; align-items: center; gap: 12px; cursor: pointer; transition: all 0.2s; position: relative; touch-action: manipulation; }
    .item-card:active { transform: scale(0.98); }
    .item-card.expiring { border-left: 4px solid #e74c3c; }
    .item-card.expired { border-left: 4px solid #999; opacity: 0.7; }
    .item-card.fresh { border-left: 4px solid #27ae60; }

    .item-img-wrap { width: 64px; height: 64px; border-radius: 12px; overflow: hidden; flex-shrink: 0; background: #f0f0f5; display: flex; align-items: center; justify-content: center; position: relative; }
    .item-img-wrap img { width: 100%; height: 100%; object-fit: cover; }
    .item-img-wrap .item-icon-fallback { font-size: 28px; }
    .item-img-wrap .fresh-badge { position: absolute; top: 2px; left: 2px; background: #27ae60; color: white; font-size: 9px; padding: 1px 5px; border-radius: 6px; font-weight: 600; }

    .item-info { flex: 1; min-width: 0; }
    .item-name { font-size: 16px; font-weight: 600; color: #1c1c1e; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .item-meta { font-size: 12px; color: #8e8e93; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .item-meta .buy-date { color: #4a6741; font-weight: 500; }
    .expiry-badge { font-size: 11px; padding: 2px 8px; border-radius: 8px; font-weight: 500; }
    .expiry-badge.warning { background: #fff3cd; color: #e74c3c; }
    .expiry-badge.danger { background: #f8d7da; color: #c0392b; }
    .expiry-badge.safe { background: #d4edda; color: #27ae60; }
    .item-arrow { font-size: 20px; color: #c7c7cc; }

    /* 出倉按鈕 */
    .out-btn { background: #e74c3c; color: white; border: none; padding: 6px 14px; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; flex-shrink: 0; touch-action: manipulation; }
    .out-btn:active { transform: scale(0.95); opacity: 0.9; }

    /* 空狀態 */
    .empty-state { text-align: center; padding: 60px 20px; }
    .empty-icon { font-size: 64px; margin-bottom: 16px; }
    .empty-title { font-size: 16px; color: #8e8e93; margin-bottom: 8px; }
    .empty-sub { font-size: 13px; color: #c7c7cc; }

    /* 底部統計 */
    .bottom-stats { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: white; border-radius: 16px; padding: 10px 20px; box-shadow: 0 4px 16px rgba(0,0,0,0.1); display: flex; gap: 24px; z-index: 5; max-width: 380px; width: 90%; }
    .stat-item { text-align: center; flex: 1; }
    .stat-value { font-size: 20px; font-weight: 700; }
    .stat-value.total { color: #2c3e50; }
    .stat-value.expiring { color: #e74c3c; }
    .stat-value.locations { color: #4a6741; }
    .stat-label { font-size: 10px; color: #8e8e93; margin-top: 2px; }

    /* 新增按鈕 */
    .fab { position: fixed; bottom: 20px; right: 20px; width: 56px; height: 56px; border-radius: 50%; background: linear-gradient(135deg, #2c3e50 0%, #4a6741 100%); border: none; color: white; font-size: 28px; cursor: pointer; box-shadow: 0 4px 16px rgba(44,62,80,0.4); z-index: 10; display: flex; align-items: center; justify-content: center; touch-action: manipulation; }
    .fab:active { transform: scale(0.95); }

    /* 彈窗 */
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 100; justify-content: flex-end; align-items: flex-end; }
    .modal-overlay.show { display: flex; }
    .modal-content { background: white; width: 100%; max-height: 92vh; border-radius: 24px 24px 0 0; padding: 20px; overflow-y: auto; animation: slideUp 0.3s ease; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .modal-title { font-size: 18px; color: #1c1c1e; }
    .modal-close { background: #f2f2f7; border: none; width: 32px; height: 32px; border-radius: 50%; font-size: 18px; cursor: pointer; }
    .form-group { margin-bottom: 16px; }
    .form-label { font-size: 13px; color: #8e8e93; display: block; margin-bottom: 6px; }
    .form-label .required { color: #e74c3c; }
    .form-input { width: 100%; padding: 12px; border: 1px solid #e5e5ea; border-radius: 12px; font-size: 15px; box-sizing: border-box; font-family: inherit; }
    .form-input:focus { outline: none; border-color: #667eea; }
    .form-textarea { width: 100%; min-height: 60px; border: 1px solid #e5e5ea; border-radius: 12px; padding: 12px; font-size: 14px; resize: vertical; box-sizing: border-box; font-family: inherit; }
    .form-row { display: flex; gap: 10px; }
    .form-row > div { flex: 1; }
    .cat-select-group { display: flex; gap: 8px; flex-wrap: wrap; }
    .cat-select { padding: 8px 14px; border-radius: 12px; border: 2px solid #e5e5ea; background: white; font-size: 14px; cursor: pointer; transition: all 0.2s; position: relative; }
    .cat-select.selected { border-color: #2c3e50; background: #eef0f5; }
    .cat-select .cat-del-btn { position: absolute; top: -6px; right: -6px; background: #e74c3c; color: white; border: none; width: 18px; height: 18px; border-radius: 50%; font-size: 10px; cursor: pointer; display: none; }
    .cat-select:hover .cat-del-btn { display: flex; align-items: center; justify-content: center; }
    .add-cat-btn { padding: 8px 14px; border-radius: 12px; border: 2px dashed #c7c7cc; background: white; color: #8e8e93; font-size: 14px; cursor: pointer; }
    .loc-group { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
    .loc-btn { padding: 6px 12px; border-radius: 10px; border: 1px solid #e5e5ea; background: white; font-size: 13px; cursor: pointer; transition: all 0.2s; }
    .loc-btn.selected { background: #2c3e50; color: white; border-color: #2c3e50; }
    .btn-group { display: flex; gap: 10px; margin-top: 20px; }
    .btn { flex: 1; padding: 14px; border-radius: 12px; border: 1px solid #e5e5ea; background: white; color: #666; font-size: 15px; cursor: pointer; font-weight: 500; touch-action: manipulation; }
    .btn-primary { flex: 2; border: none; background: linear-gradient(135deg, #2c3e50 0%, #4a6741 100%); color: white; }
    .btn:active { opacity: 0.8; }

    /* 圖片上傳 */
    .img-upload-area { width: 100%; height: 160px; border: 2px dashed #e5e5ea; border-radius: 16px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s; background: #fafafa; position: relative; overflow: hidden; }
    .img-upload-area:hover { border-color: #667eea; background: #f5f5ff; }
    .img-upload-area.has-img { border: none; padding: 0; }
    .img-upload-area img { width: 100%; height: 100%; object-fit: cover; }
    .img-upload-icon { font-size: 40px; margin-bottom: 8px; }
    .img-upload-text { font-size: 14px; color: #8e8e93; }
    .img-upload-hint { font-size: 12px; color: #c7c7cc; margin-top: 4px; }
    .img-remove { position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.6); color: white; border: none; width: 28px; height: 28px; border-radius: 50%; font-size: 16px; cursor: pointer; z-index: 2; }

    /* 詳情彈窗 */
    .detail-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 100; justify-content: center; align-items: center; padding: 20px; }
    .detail-overlay.show { display: flex; }
    .detail-card { background: white; width: 100%; max-width: 360px; border-radius: 20px; padding: 0; max-height: 85vh; overflow-y: auto; }
    .detail-img { width: 100%; height: 200px; object-fit: cover; border-radius: 20px 20px 0 0; background: linear-gradient(135deg, #2c3e50 0%, #4a6741 100%); display: flex; align-items: center; justify-content: center; }
    .detail-img img { width: 100%; height: 100%; object-fit: cover; border-radius: 20px 20px 0 0; }
    .detail-img .detail-icon-fallback { font-size: 80px; }
    .detail-body { padding: 20px; }
    .detail-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .detail-cat { font-size: 13px; padding: 4px 12px; border-radius: 10px; }
    .detail-name { font-size: 22px; color: #1c1c1e; margin-bottom: 8px; }
    .detail-qty { font-size: 16px; color: #667eea; font-weight: 600; margin-bottom: 16px; }
    .detail-info-box { background: #f8f9fa; border-radius: 12px; padding: 16px; margin-bottom: 16px; }
    .detail-info-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .detail-info-row:last-child { margin-bottom: 0; }
    .detail-info-icon { font-size: 20px; }
    .detail-info-label { font-size: 12px; color: #8e8e93; }
    .detail-info-value { font-size: 15px; color: #1c1c1e; font-weight: 500; }
    .detail-note { font-size: 14px; color: #666; line-height: 1.6; margin-bottom: 20px; }
    .detail-actions { display: flex; gap: 10px; }
    .detail-actions .btn { padding: 12px; }
    .btn-danger { background: #e74c3c; color: white; border: none; }
    .btn-out { background: #e74c3c; color: white; border: none; }

    /* 出倉確認 */
    .confirm-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 150; justify-content: center; align-items: center; padding: 20px; }
    .confirm-overlay.show { display: flex; }
    .confirm-card { background: white; width: 100%; max-width: 320px; border-radius: 20px; padding: 24px; text-align: center; }
    .confirm-icon { font-size: 48px; margin-bottom: 12px; }
    .confirm-title { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
    .confirm-text { font-size: 14px; color: #666; margin-bottom: 20px; }
    .confirm-actions { display: flex; gap: 10px; }

    /* 新增分類彈窗 */
    .cat-modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 120; justify-content: center; align-items: center; padding: 20px; }
    .cat-modal-overlay.show { display: flex; }
    .cat-modal-card { background: white; width: 100%; max-width: 340px; border-radius: 20px; padding: 24px; }
    .cat-modal-title { font-size: 18px; font-weight: 600; margin-bottom: 16px; }
    .color-picker { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
    .color-option { width: 36px; height: 36px; border-radius: 50%; border: 3px solid transparent; cursor: pointer; transition: all 0.2s; }
    .color-option.selected { border-color: #2c3e50; transform: scale(1.15); }
    .icon-picker { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
    .icon-option { width: 40px; height: 40px; border-radius: 10px; border: 2px solid #e5e5ea; background: white; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
    .icon-option.selected { border-color: #2c3e50; background: #eef0f5; }

    /* 設定彈窗 */
    .settings-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 110; justify-content: center; align-items: center; padding: 20px; }
    .settings-overlay.show { display: flex; }
    .settings-card { background: white; width: 100%; max-width: 340px; border-radius: 20px; padding: 24px; }
    .settings-title { font-size: 18px; font-weight: 600; margin-bottom: 16px; }
    .settings-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #f0f0f5; }
    .settings-row:last-child { border-bottom: none; }
    .settings-label { font-size: 15px; }
    .settings-value { font-size: 14px; color: #8e8e93; }
    .settings-btn { background: #f2f2f7; border: none; padding: 8px 16px; border-radius: 10px; font-size: 14px; cursor: pointer; }

    /* 安裝提示 */
    .install-banner { display: none; background: linear-gradient(135deg, #2c3e50 0%, #4a6741 100%); color: white; padding: 12px 16px; position: fixed; top: 0; left: 0; right: 0; z-index: 200; align-items: center; gap: 12px; }
    .install-banner.show { display: flex; }
    .install-text { flex: 1; font-size: 14px; }
    .install-btn { background: white; color: #2c3e50; border: none; padding: 8px 16px; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; }
    .install-close { background: none; border: none; color: white; font-size: 20px; cursor: pointer; }

    .offline-bar { display: none; background: #e74c3c; color: white; text-align: center; padding: 6px; font-size: 13px; position: fixed; top: 0; left: 0; right: 0; z-index: 199; }
    .offline-bar.show { display: block; }

    .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(100px); background: #333; color: white; padding: 12px 24px; border-radius: 12px; font-size: 14px; z-index: 300; opacity: 0; transition: all 0.3s ease; white-space: nowrap; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  </style>
</head>
<body>
  <div id="offlineBar" class="offline-bar">⚠️ 目前處於離線模式</div>
  <div id="installBanner" class="install-banner">
    <span class="install-text">📲 將「家倉」安裝到主畫面，隨時管理家中物品</span>
    <button class="install-btn" onclick="installApp()">安裝</button>
    <button class="install-close" onclick="dismissInstall()">×</button>
  </div>

  <!-- 登入畫面 -->
  <div id="loginScreen" class="login-screen">
    <div class="login-icon">🏠</div>
    <div class="login-title">家倉</div>
    <div class="login-sub">家庭物品管理倉庫<br>全家人一起管理家中物品</div>
    <div class="login-form">
      <div id="loginError" class="login-error">家庭密碼錯誤，請重新輸入</div>
      <input id="familyName" class="login-input" type="text" placeholder="家庭名稱（例如：陳家）">
      <input id="familyPassword" class="login-input" type="password" placeholder="家庭密碼（全家人共用）">
      <button class="login-btn" onclick="doLogin()">進入倉庫</button>
      <div class="login-hint">💡 第一次使用？輸入家庭名稱和密碼即可建立新倉庫<br>家人使用相同名稱和密碼即可加入</div>
    </div>
  </div>

  <!-- 主畫面 -->
  <div id="mainApp" style="display:none">
    <div id="syncStatus" class="sync-status"></div>

    <div class="header">
      <div class="header-top">
        <h1>🏠 <span id="familyDisplayName">家倉</span></h1>
        <div style="display:flex;gap:8px;align-items:center">
          <span id="itemCount" class="item-count">0 件物品</span>
          <button onclick="openSettings()" style="background:none;border:none;color:white;font-size:20px;cursor:pointer">⚙️</button>
        </div>
      </div>
      <div class="cat-scroll" id="catScroll"></div>
    </div>

    <div class="search-box">
      <div class="search-inner">
        <span style="font-size:18px">🔍</span>
        <input id="searchInput" type="text" placeholder="搜索物品名稱、位置、標籤..." oninput="searchItems()">
      </div>
    </div>

    <div id="expiryAlert" class="expiry-alert" style="display:none"></div>

    <div id="itemsList" class="items-list"></div>
    <div id="emptyState" class="empty-state" style="display:none">
      <div class="empty-icon">📦</div>
      <div class="empty-title">倉庫還是空的</div>
      <div class="empty-sub">點擊右下角按鈕新增第一件物品</div>
    </div>

    <div class="bottom-stats">
      <div class="stat-item">
        <div id="statTotal" class="stat-value total">0</div>
        <div class="stat-label">總物品</div>
      </div>
      <div class="stat-item">
        <div id="statExpiring" class="stat-value expiring">0</div>
        <div class="stat-label">即將過期</div>
      </div>
      <div class="stat-item">
        <div id="statLocations" class="stat-value locations">0</div>
        <div class="stat-label">收納位置</div>
      </div>
    </div>

    <button class="fab" onclick="openAddModal()">+</button>
  </div>

  <!-- 新增/編輯彈窗 -->
  <div id="addModal" class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modalTitle" class="modal-title">📦 新增物品</h3>
        <button class="modal-close" onclick="closeModal()">×</button>
      </div>

      <div class="form-group">
        <label class="form-label">物品照片</label>
        <div id="imgUploadArea" class="img-upload-area" onclick="document.getElementById('imgInput').click()">
          <span class="img-upload-icon">📷</span>
          <span class="img-upload-text">點擊上傳照片</span>
          <span class="img-upload-hint">支援 JPG、PNG</span>
        </div>
        <input id="imgInput" type="file" accept="image/*" style="display:none" onchange="handleImageUpload(event)">
      </div>

      <div class="form-group">
        <label class="form-label">物品名稱 <span class="required">*</span></label>
        <input id="itemName" class="form-input" type="text" placeholder="例如：牛奶、感冒藥...">
      </div>

      <div class="form-group">
        <label class="form-label">分類</label>
        <div class="cat-select-group" id="catSelectGroup"></div>
      </div>

      <div class="form-group">
        <div class="form-row">
          <div>
            <label class="form-label">數量</label>
            <input id="itemQty" class="form-input" type="number" value="1" min="1">
          </div>
          <div>
            <label class="form-label">單位</label>
            <input id="itemUnit" class="form-input" type="text" placeholder="個/盒/瓶...">
          </div>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">存放位置</label>
        <div class="loc-group">
          <button class="loc-btn" onclick="setLocation('冰箱')">🧊 冰箱</button>
          <button class="loc-btn" onclick="setLocation('櫥櫃')">🚪 櫥櫃</button>
          <button class="loc-btn" onclick="setLocation('衣櫃')">👔 衣櫃</button>
          <button class="loc-btn" onclick="setLocation('抽屜')">📥 抽屜</button>
          <button class="loc-btn" onclick="setLocation('儲藏室')">🏠 儲藏室</button>
        </div>
        <input id="itemLocation" class="form-input" type="text" placeholder="或輸入自定義位置...">
      </div>

      <div class="form-group">
        <div class="form-row">
          <div>
            <label class="form-label">買入日期</label>
            <input id="itemBuyDate" class="form-input" type="date">
          </div>
          <div>
            <label class="form-label">有效期限</label>
            <input id="itemExpiry" class="form-input" type="date">
          </div>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">備註</label>
        <textarea id="itemNote" class="form-textarea" placeholder="品牌、規格、購買地點等..."></textarea>
      </div>

      <div class="btn-group">
        <button class="btn" onclick="closeModal()">取消</button>
        <button class="btn btn-primary" onclick="saveItem()">儲存物品</button>
      </div>
    </div>
  </div>

  <!-- 詳情彈窗 -->
  <div id="detailModal" class="detail-overlay" onclick="if(event.target===this)closeDetailModal()">
    <div class="detail-card">
      <div id="detailImg" class="detail-img">
        <span id="detailIconFallback" class="detail-icon-fallback">📦</span>
      </div>
      <div class="detail-body">
        <div class="detail-header">
          <span id="detailCategory" class="detail-cat"></span>
          <button class="modal-close" onclick="closeDetailModal()">×</button>
        </div>
        <h3 id="detailName" class="detail-name"></h3>
        <div id="detailQty" class="detail-qty"></div>

        <div class="detail-info-box">
          <div class="detail-info-row">
            <span class="detail-info-icon">📍</span>
            <div>
              <div class="detail-info-label">存放位置</div>
              <div id="detailLocation" class="detail-info-value"></div>
            </div>
          </div>
          <div id="detailBuyDateRow" class="detail-info-row">
            <span class="detail-info-icon">🛒</span>
            <div>
              <div class="detail-info-label">買入日期</div>
              <div id="detailBuyDate" class="detail-info-value"></div>
            </div>
          </div>
          <div id="detailExpiryRow" class="detail-info-row">
            <span class="detail-info-icon">⏰</span>
            <div>
              <div class="detail-info-label">有效期限</div>
              <div id="detailExpiry" class="detail-info-value"></div>
            </div>
          </div>
        </div>

        <div id="detailNote" class="detail-note"></div>

        <div class="detail-actions">
          <button class="btn" style="color:#667eea" onclick="editItem()">✏️ 編輯</button>
          <button class="btn btn-out" onclick="confirmOut()">📤 出倉</button>
          <button class="btn btn-danger" onclick="deleteItem()">🗑️ 刪除</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 出倉確認 -->
  <div id="confirmOutModal" class="confirm-overlay" onclick="if(event.target===this)closeConfirmOut()">
    <div class="confirm-card">
      <div class="confirm-icon">📤</div>
      <div class="confirm-title">確認出倉？</div>
      <div class="confirm-text" id="confirmOutText">這件物品將從倉庫中移除</div>
      <div class="confirm-actions">
        <button class="btn" onclick="closeConfirmOut()">取消</button>
        <button class="btn btn-danger" onclick="doOut()">確認出倉</button>
      </div>
    </div>
  </div>

  <!-- 新增分類彈窗 -->
  <div id="catModal" class="cat-modal-overlay" onclick="if(event.target===this)closeCatModal()">
    <div class="cat-modal-card">
      <div class="cat-modal-title">➕ 新增分類</div>
      <div class="form-group">
        <label class="form-label">分類名稱</label>
        <input id="newCatName" class="form-input" type="text" placeholder="例如：文具、寵物用品...">
      </div>
      <div class="form-group">
        <label class="form-label">選擇圖示</label>
        <div class="icon-picker" id="iconPicker"></div>
      </div>
      <div class="form-group">
        <label class="form-label">選擇顏色</label>
        <div class="color-picker" id="colorPicker"></div>
      </div>
      <div class="btn-group">
        <button class="btn" onclick="closeCatModal()">取消</button>
        <button class="btn btn-primary" onclick="saveNewCategory()">建立分類</button>
      </div>
    </div>
  </div>

  <!-- 設定彈窗 -->
  <div id="settingsModal" class="settings-overlay" onclick="if(event.target===this)closeSettings()">
    <div class="settings-card">
      <div class="settings-title">⚙️ 設定</div>
      <div class="settings-row">
        <span class="settings-label">家庭名稱</span>
        <span id="settingsFamilyName" class="settings-value"></span>
      </div>
      <div class="settings-row">
        <span class="settings-label">同步狀態</span>
        <span id="settingsSyncStatus" class="settings-value">已連線</span>
      </div>
      <div class="settings-row">
        <span class="settings-label">資料儲存</span>
        <span class="settings-value">Firebase Realtime DB</span>
      </div>
      <div class="btn-group" style="margin-top:16px">
        <button class="btn" onclick="closeSettings()">關閉</button>
        <button class="btn btn-danger" onclick="doLogout()">🚪 登出</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <script src="app.js"></script>
</body>
</html>
